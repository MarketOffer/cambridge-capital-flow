        <h1>brightcap — Cambridge Property Co-Investment</h1>
        <p>Investing in real estate for the AI era. brightcap acquires residential blocks in Cambridge in selective partnership with sophisticated co-investors.</p>

        <h2>Our Thesis</h2>
        <p>AI is accelerating the economic growth of a small number of cities — and leaving others behind. That's not a cycle — it's a shift. The cities at the centre of it will attract talent, capital and opportunity for decades — driving long-term rental demand and property values in the process. The market hasn't priced this in yet. We've built our strategy around it.</p>

        <h2>Why Cambridge</h2>
        <p>Cambridge is home to one of the world's most concentrated AI ecosystems. With world-class research, a deep talent pipeline, and structural supply constraints, it offers a rare combination of long-term demand drivers and limited housing supply. brightcap focuses on acquiring residential blocks in Cambridge — targeting value-add opportunities in a market with strong fundamentals.</p>

        <h2>What We Acquire</h2>
        <p>We target residential blocks in Cambridge that offer value-add potential through refurbishment, reconfiguration, or improved management. Our construction partner has operated in Cambridge for over 25 years.</p>

        <h2>The Founders</h2>
        <p>Andy Fidler — Decades of experience building and scaling businesses. £5.7M property portfolio. Featured in BBC, The Telegraph, and multiple property industry publications. Winner of 20+ UK and Global property and business awards.</p>
        <p>Sam Carter — Co-founder with combined 34 years of experience across property and business.</p>
        <p>brightcap is built on a simple conviction: the right location, the right thesis, and the right local partnerships matter more than financial engineering.</p>

        <h2>Investor Profile</h2>
        <p>We partner with sophisticated, high-net-worth individuals who are looking to co-invest in Cambridge residential property. Typical investment amounts range from £250k to £3m+.</p>

        <h2>Featured In</h2>
        <p>BBC, The Telegraph, Landlord Today, Landlord Zone, NRLA, Property Notify, Property Entrepreneur, Property Investor Awards.</p>

        <h2>Contact</h2>
        <p>Book a partner investor call — a 30-minute call to understand your goals, walk you through our Cambridge block strategy, and explore whether there's a genuine fit.</p>
