        <h1>brightcap — Cambridge Property Co-Investment</h1>
        <p>Investing in real estate for the AI era. We partner with business owners to grow their wealth through acquiring residential property in cities at the centre of the AI transformation.</p>

        <h2>The Opportunity</h2>
        <p>AI is accelerating the economic growth of a small number of cities — and leaving others behind. That's not a cycle — it's a shift. The cities at the centre of it will attract talent, capital and opportunity for decades — driving long-term rental demand and property values in the process. The market hasn't priced this in yet. We've built our strategy around it.</p>

        <h2>Why Cambridge</h2>
        <p>Cambridge is our first market — the world's leading science and tech cluster. No.1 Global Science & Tech cluster in the world (WIPO 2022–2024). No.1 UK university. 5,300+ science & tech firms including Google, Apple, ARM, AstraZeneca. 50% capital growth over the last 10 years. 5× the UK's average employment growth.</p>

        <h2>What We Acquire</h2>
        <p>We buy residential blocks in Cambridge and turn them into high quality homes. Step 1: Acquire undervalued blocks — typically 2 to 20 units. Step 2: Create 15–25% equity uplift through title splitting and high-spec renovation. Step 3: Generate long-term hands-off income — let to professional tenants or supported living providers.</p>

        <h2>Our Construction Team</h2>
        <p>Our renovations are delivered by our founder's family-run construction and maintenance business — building in Cambridge for over 25 years. They build to last and the same team maintains it — so standards stay high and issues get resolved fast.</p>

        <h2>Who Invests With Us</h2>
        <p>Our partner investors are exited founders and business owners with capital to put to work, who want long-term exposure to Cambridge without building their own property team. Typical investment amounts range from £250k to £3m+.</p>

        <h2>The Founders</h2>
        <p>brightcap is led by entrepreneurs with a track record of building businesses and delivering property projects for private investors.</p>
        <p>Andy Fidler — Decades of experience building and scaling businesses. £5.7M property portfolio. Featured in BBC, The Telegraph, and multiple property industry publications. Winner of 20+ UK & Global property and business awards.</p>
        <p>Sam Carter — Co-founder with combined 34 years of experience across property and business.</p>
        <p>Alongside brightcap, they own MarketOffer, a nationwide social housing leasing platform, and Sam's family construction and maintenance business has been delivering projects in Cambridge for over 25 years.</p>

        <h2>Investor Testimonial</h2>
        <p>"I was looking to grow my wealth through property investment but didn't have the expertise or time to handle it myself. Sam and his team made the entire process seamless, managing everything from start to finish. Their professionalism and expertise have exceeded my expectations – an effortless investment experience with a great return!" — Mr. Tomlinson, Business Owner</p>

        <h2>Featured In</h2>
        <p>BBC, The Telegraph, Landlord Today, Landlord Zone, NRLA, Property Notify, Property Entrepreneur, Property Investor Awards.</p>

        <h2>Contact</h2>
        <p>Interested in growing your property wealth in the AI era? Book a partner investor call — a 30-minute call to understand your goals, walk you through our Cambridge block strategy, and explore whether there's a genuine fit.</p>
